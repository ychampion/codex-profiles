<svg xmlns="http://www.w3.org/2000/svg" width="1365" height="768" fill="none" viewBox="0 0 1365 768"><defs><linearGradient id="bg" x1="60" x2="1320" y1="30" y2="760" gradientUnits="userSpaceOnUse"><stop stop-color="#061022"/><stop offset=".55" stop-color="#0A1633"/><stop offset="1" stop-color="#15153B"/></linearGradient><radialGradient id="tealGlow" cx="0" cy="0" r="1" gradientTransform="translate(170 138) rotate(49.5) scale(196 170)" gradientUnits="userSpaceOnUse"><stop stop-color="#43E8FF" stop-opacity=".62"/><stop offset="1" stop-color="#43E8FF" stop-opacity="0"/></radialGradient><radialGradient id="purpleTop" cx="0" cy="0" r="1" gradientTransform="translate(1120 104) rotate(90) scale(168 178)" gradientUnits="userSpaceOnUse"><stop stop-color="#B769FF" stop-opacity=".6"/><stop offset="1" stop-color="#B769FF" stop-opacity="0"/></radialGradient><radialGradient id="purpleBottom" cx="0" cy="0" r="1" gradientTransform="translate(1084 628) rotate(90) scale(228 228)" gradientUnits="userSpaceOnUse"><stop stop-color="#FF4FC6" stop-opacity=".55"/><stop offset="1" stop-color="#FF4FC6" stop-opacity="0"/></radialGradient><filter id="noise" width="140%" height="140%" x="-20%" y="-20%"><feTurbulence baseFrequency=".95" numOctaves="2" result="turb" seed="7" type="fractalNoise"/><feColorMatrix in="turb" type="saturate" values="0"/><feComponentTransfer><feFuncA tableValues="0 0.05" type="table"/></feComponentTransfer></filter><filter id="softShadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="18" flood-color="#020617" flood-opacity=".4" stdDeviation="18"/></filter><style>.title{font-size:72px;font-weight:800;fill:#f8fafc;letter-spacing:-1.4px}.cardText,.cardTitle,.pillText,.subtitle,.title{font-family:&apos;Segoe UI&apos;,Inter,Arial,sans-serif}.subtitle{font-size:27px;font-weight:560;fill:#d5d9e6}.cardTitle,.pillText{font-weight:760}.pillText{font-size:20px;fill:#f3f6ff}.cardTitle{font-size:26px;fill:#f7faff}.cardText{font-size:20px;font-weight:560;fill:#