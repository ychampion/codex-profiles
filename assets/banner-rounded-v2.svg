 x="8" y="46" fill="#4BE1F7" fill-opacity=".82" rx="8"/><rect width="36" height="34" x="48" y="46" fill="#C3F7FF" fill-opacity=".68" rx="8"/><rect width="92" height="92" x="0" y="0" stroke="rgba(140,251,255,0.34)" rx="22"/></g><text x="260" y="535" class="cardTitle">Desktop profiles</text><text x="260" y="575" class="cardText">Alpha, Bloom, Nova.</text><text x="260" y="613" class="cardText">Own auth, config,</text><text x="260" y="651" class="cardText">and UI data.</text></g><g filter="url(#softShadow)"><rect width="398" height="186" x="482" y="449" fill="rgba(28,36,74,0.72)" stroke="rgba(119,157,255,0.24)" stroke-width="2" rx="28"/><g transform="translate(514 483)"><circle cx="52" cy="52" r="52" fill="rgba(94,126,255,0.14)"/><path fill="#D7E2FF" fill-opacity=".42" d="M52 15C56 22 60 27 67 30C74 33 81 34 88 33C85 42 84 49 86 57C88 64 92 70 98 77C90 79 84 82 79 88C74 94 71 100 69 108C60 104 54 103 46 104C38 105 31 108 23 113C22 104 20 98 15 91C11 84 7 79 0 74C8 69 13 64 16 57C19 50 20 42 19 34C29 36 36 36 43 33C46 32 49 30 52 15Z"/><circle cx="52" cy="52" r="18" fill="#8EA8FF" fill-opacity=".85"/><circle cx="52" cy="52" r="8" fill="#E8EEFF"/></g><text x="621" y="535" class="cardTitle">Environment scrub</text><text x="621" y="575" class="cardText">Clears proxy and base-</text><text x="621" y="613" class="cardText">url vars before Codex</text><text x="621" y="651" class="cardText">desktop launches.</text></g><g filter="url(#softShadow)"><rect width="346" height="518" x="904" y="117" fill="rgba(36,26,70,0.63)" stroke="rgba(209,107,255,0.7)" stroke-width="2" rx="30"/><text x="944" y="170" class="rightLabel">WINDOWS TOOLKIT</text><text x="944" y="245" class="rightTitle">Launch many Codex</text><text x="944" y="288" class="rightTitle">profiles at once</text><rect width="266" height="77" x="944" y="338" fill="rgba(82,89,131,0.28)" stroke="rgba(164,173,255,0.25)" stroke-width="2" rx="22"/><text x="970" y="381" class="rightText">Clone Store app once</text><text x="970" y="414" class="rightText">per version</text><rect width="266" height="77" x="944" y="432" fill="rgba(82,89,131,0.28)" stroke="rgba(164,173,255,0.25)" stroke-width="2" rx="22"/><text x="970" y="475" class="rightText">Isolate CODEX_HOME</text><text x="970" y="508" class="rightText">and user-data-dir</text><rect width="266" height="77" x="944" y="526" fill="rgba(82,89,131,0.28)" stroke="rgba(164,173,255,0.25)" stroke-width="2" rx="22"/><text x="970" y="569" class="rightText">Keep custom CLI endpoint</text><text x="970" y="602" class="rightText">untouched</text></g></svg>